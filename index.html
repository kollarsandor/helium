<style>
:root {
  --sat: env(safe-area-inset-top, 0px);
  --sar: env(safe-area-inset-right, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --blue: #0071e3;
  --blue-l: #147CE5;
  --surface: rgba(16,16,18,0.78);
  --surface-hi: rgba(255,255,255,0.055);
  --border: rgba(255,255,255,0.08);
  --border-s: rgba(255,255,255,0.05);
  --fg: #f5f5f7;
  --fg2: rgba(245,245,247,0.5);
  --fg3: rgba(245,245,247,0.25);
  --acc: #0071e3;
  --accent: #0071e3;
  --glass: rgba(20,20,24,0.72);
  --bg: rgba(10,10,14,0.97);
  --hover: rgba(255,255,255,0.07);
  --user-bg: #0071e3;
  --ai-bg: rgba(28,28,32,0.95);
  --ai-fg: #f5f5f7;
  --rc-bg: rgba(26,26,30,0.85);
  --input-bg: rgba(255,255,255,0.07);
  --input-border: rgba(255,255,255,0.07);
  --sep: rgba(255,255,255,0.06);
  --liquid-glass: rgba(255,255,255,0.085);
  --liquid-border: rgba(255,255,255,0.28);
  --liquid-shadow: 0 8px 32px -4px rgba(0,113,227,0.28);
  --glow: rgba(0,113,227,0.22);
}
@media (prefers-color-scheme: light) {
  :root {
    --surface: rgba(248,248,250,0.82);
    --surface-hi: rgba(255,255,255,0.9);
    --border: rgba(0,0,0,0.07);
    --border-s: rgba(0,0,0,0.04);
    --fg: #1d1d1f;
    --fg2: rgba(29,29,31,0.5);
    --fg3: rgba(29,29,31,0.26);
    --bg: rgba(245,245,247,0.97);
    --hover: rgba(0,0,0,0.06);
    --ai-bg: rgba(242,242,247,0.96);
    --ai-fg: #1d1d1f;
    --rc-bg: rgba(238,238,244,0.9);
    --input-bg: rgba(0,0,0,0.05);
    --input-border: rgba(0,0,0,0.07);
    --sep: rgba(0,0,0,0.06);
    --liquid-glass: rgba(245,245,247,0.88);
    --liquid-border: rgba(0,0,0,0.14);
    --liquid-shadow: 0 8px 32px -4px rgba(0,113,227,0.16);
    --glow: rgba(0,113,227,0.18);
  }
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; width:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Helvetica Neue',sans-serif; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
body { background:#000; }
@media (prefers-color-scheme:light) { body { background:#f5f5f7; } }
@supports (border-radius: 18px) { .bubble,.ai-bubble,.toast,.ibox,.sb-new,.hcard,.rc-wrap,.srch-bar,.err-bbl,.rcn-bar,.cb { -webkit-mask-image:-webkit-radial-gradient(white,black); } }
#bg { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
.orb { position:absolute; border-radius:50%; filter:blur(110px); will-change:transform; animation:drift var(--d,24s) ease-in-out infinite alternate; contain:strict; }
.o1 { width:480px; height:480px; top:-100px; right:-80px; background:radial-gradient(circle,rgba(0,113,227,.12) 0%,transparent 70%); --d:22s; }
.o2 { width:360px; height:360px; bottom:12%; left:-100px; background:radial-gradient(circle,rgba(70,70,190,.08) 0%,transparent 70%); --d:29s; animation-direction:alternate-reverse; }
.o3 { width:280px; height:280px; bottom:0; right:8%; background:radial-gradient(circle,rgba(0,70,150,.06) 0%,transparent 70%); --d:20s; }
@keyframes drift { 0%{transform:translate(0,0) scale(1);} 33%{transform:translate(16px,-20px) scale(1.03);} 66%{transform:translate(-10px,14px) scale(.97);} 100%{transform:translate(20px,8px) scale(1.02);} }
#app { display:flex; flex-direction:column; height:100vh; min-height:100dvh; width:100%; position:relative; overflow:hidden; }
#sidebar {
  position:fixed; inset:0; z-index:310;
  padding-top:var(--sat);
  background:var(--surface);
  backdrop-filter:blur(60px) saturate(200%) brightness(92%);
  -webkit-backdrop-filter:blur(60px) saturate(200%) brightness(92%);
  display:flex; flex-direction:column;
  transform:translateX(-100%);
  transition:transform 420ms cubic-bezier(0.32,0.72,0,1.18);
  will-change:transform;
}
#sidebar.open { transform:translateX(0); }
#sidebar.dragging { transition:none; }
.sb-hdr {
  height:52px; display:flex; align-items:center;
  padding:0 12px; border-bottom:.5px solid var(--sep); flex-shrink:0; gap:6px;
}
.sb-title { flex:1; text-align:center; font-size:15px; font-weight:600; letter-spacing:-.3px; color:var(--fg); }
.sb-close {
  width:28px; height:28px; border-radius:50%; border:none;
  display:flex; align-items:center; justify-content:center;
  background:var(--input-bg); color:var(--fg3); cursor:pointer;
  transition:transform .18s cubic-bezier(.2,1,.3,1), opacity .12s;
}
.sb-close:active { transform:scale(.88); opacity:.7; }
.sb-close svg { width:13px; height:13px; fill:currentColor; }
#sb-search-bar {
  flex-shrink:0; overflow:hidden; height:0;
  transition:height .32s cubic-bezier(.34,1.28,.64,1);
}
#sb-search-bar.open { height:54px; }
.sb-si {
  display:flex; align-items:center; gap:8px;
  margin:8px 14px 6px;
  background:var(--input-bg); border-radius:13px;
  border:.5px solid var(--input-border); padding:0 12px;
  height:38px;
}
.sb-si svg { width:15px; height:15px; fill:var(--fg3); flex-shrink:0; }
#sb-q {
  flex:1; background:transparent; border:none; outline:none;
  font-family:inherit; font-size:15px; color:var(--fg); padding:0;
  min-width:0;
}
#sb-q::placeholder { color:var(--fg3); }
#sb-q-cancel {
  border:none; background:none; cursor:pointer; font-family:inherit;
  font-size:14px; font-weight:500; color:var(--blue-l); padding:0 0 0 8px;
  white-space:nowrap; transition:opacity .2s, width .28s cubic-bezier(.4,0,.2,1);
  overflow:hidden; width:0; opacity:0; flex-shrink:0;
}
#sb-search-bar.open #sb-q-cancel { width:52px; opacity:1; }
.sb-body { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; scrollbar-width:none; padding:12px; }
.sb-body::-webkit-scrollbar { display:none; }
.sb-pull-hint {
  display:flex; align-items:center; justify-content:center; gap:5px;
  padding:6px 0 0; font-size:11px; color:var(--fg3); pointer-events:none;
  opacity:0; transition:opacity .2s;
}
.sb-pull-hint svg { width:12px; height:12px; fill:var(--fg3); }
#sidebar.pull-hinting .sb-pull-hint { opacity:1; }
.sb-new {
  display:flex; align-items:center; gap:10px;
  padding:11px 13px; border-radius:12px; margin-bottom:10px;
  border:none; width:100%; cursor:pointer; font-family:inherit;
  background:rgba(0,113,227,.12); border:.5px solid rgba(0,113,227,.2);
  font-size:13.5px; font-weight:500; color:var(--blue-l);
  transition:transform .22s cubic-bezier(.2,1,.3,1), background .14s; text-align:left;
}
.sb-new:active { background:rgba(0,113,227,.2); transform:scale(.97); }
.sb-new svg { width:15px; height:15px; fill:currentColor; flex-shrink:0; }
@media (prefers-color-scheme:light) { .sb-new { background:rgba(0,113,227,.08); } }
.sb-sec { font-size:11px; font-weight:600; color:var(--fg3); letter-spacing:.5px; text-transform:uppercase; padding:2px 3px 8px; margin-top:4px; }
.hcard {
  display:flex; align-items:flex-start; gap:10px; padding:11px 12px;
  border-radius:12px; cursor:pointer; margin-bottom:6px;
  background:transparent; border:.5px solid transparent;
  transition:transform .22s cubic-bezier(.2,1,.3,1), background .14s, border-color .14s;
}
.hcard:hover { background:var(--input-bg); border-color:var(--border-s); }
.hcard:active { transform:scale(.97); background:var(--input-bg); }
.hcard.active { background:rgba(0,113,227,.1); border-color:rgba(0,113,227,.18); }
@media (prefers-color-scheme:light) { .hcard.active { background:rgba(0,113,227,.08); } }
.hcard-body { flex:1; min-width:0; }
.hcard-pre { font-size:13px; font-weight:500; color:var(--fg); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-.15px; }
.hcard-pre mark { background:rgba(0,113,227,.22); color:var(--blue-l); border-radius:3px; padding:0 1px; }
.hcard.active .hcard-pre { color:var(--blue-l); }
.hcard-meta { font-size:11px; color:var(--fg3); margin-top:2px; }
.hcard-del {
  width:24px; height:24px; border-radius:6px; border:none; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:transparent; color:var(--fg3); cursor:pointer; opacity:0;
  transition:opacity .13s, transform .2s cubic-bezier(.2,1,.3,1), background .12s, color .12s;
}
.hcard:hover .hcard-del { opacity:1; }
.hcard-del:active { background:rgba(255,59,48,.15); color:rgba(255,59,48,.8); transform:scale(.85); }
.hcard-del svg { width:13px; height:13px; fill:currentColor; }
.h-empty { display:flex; flex-direction:column; align-items:center; gap:9px; padding:48px 16px; text-align:center; }
.h-empty svg { width:28px; height:28px; fill:var(--fg3); opacity:.45; }
.h-empty p { font-size:13px; color:var(--fg3); line-height:1.5; }
#content { flex:1; overflow:hidden; position:relative; z-index:1; touch-action:pan-y; }
#scroll-area {
  position:absolute; top:var(--sat); right:0; bottom:0; left:0;
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch; overscroll-behavior-y:contain;
  touch-action:pan-y;
  scrollbar-width:none;
  padding:12px 0 84px;
  scroll-padding: 20px 0;
}
#scroll-area::-webkit-scrollbar { display:none; }
#scroll-area::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(transparent, var(--glow));
  opacity: 0;
  transition: opacity .25s cubic-bezier(0.23,1,0.32,1);
  z-index: 1;
}
#scroll-area:active::after,
#scroll-area.scrolling::after { opacity: 0.6; }
#msg-list { display:flex; flex-direction:column; padding:0 14px; min-height:100%; }
.msg-group { 
  display:flex; flex-direction:column; margin-bottom:14px; 
  animation: bubbleSpring 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}
.msg-group.u { align-items:flex-end; }
.msg-group.a { align-items:flex-start; }
@keyframes bubbleSpring {
  from { transform: translateY(14px) scale(0.93); opacity: 0; }
  to { transform: none; opacity: 1; }
}
.bubble {
  max-width:min(76vw,344px); padding:10px 14px;
  font-size:15px; line-height:1.5; letter-spacing:-.18px;
  word-break:break-word; border-radius:18px;
  position:relative;
}
.u .bubble {
  background:var(--user-bg); color:#fff;
  border-bottom-right-radius:4px;
  box-shadow:0 1px 8px rgba(0,113,227,.25), 0 0 0 .5px rgba(0,113,227,.12);
  animation:bubbleIn .32s cubic-bezier(.34,1.3,.64,1);
}
.u .bubble::after {
  content:''; 
  position:absolute; 
  bottom:0; 
  right:-6px;
  width:12px; 
  height:12px;
  background:var(--user-bg);
  clip-path:polygon(0 0, 100% 0, 0 100%);
  transform:rotate(45deg);
  z-index:-1;
}
@keyframes bubbleIn { from{opacity:0;transform:translateY(12px) scale(.93);} to{opacity:1;transform:none;} }
@keyframes aiBubbleIn { from{opacity:0;transform:translateX(-8px) scale(.97);} to{opacity:1;transform:none;} }
.ai-bubble {
  max-width:min(88vw,440px); padding:12px 15px;
  font-size:15px; line-height:1.55; letter-spacing:-.15px;
  word-break:break-word; border-radius:18px; border-bottom-left-radius:4px;
  background:var(--ai-bg); color:var(--ai-fg);
  backdrop-filter:blur(32px) saturate(160%);
  -webkit-backdrop-filter:blur(32px) saturate(160%);
  border:.5px solid var(--border);
  box-shadow:0 1px 3px rgba(0,0,0,.16);
  animation:aiBubbleIn .36s cubic-bezier(.34,1.15,.64,1);
  position:relative;
}
.ai-bubble::after {
  content:''; 
  position:absolute; 
  bottom:0; 
  left:-6px;
  width:12px; 
  height:12px;
  background:var(--ai-bg);
  clip-path:polygon(100% 0, 0 0, 100% 100%);
  transform:rotate(-45deg);
  z-index:-1;
}
.img-in-msg { border-radius:14px; overflow:hidden; max-width:220px; max-height:185px; object-fit:cover; display:block; margin-bottom:6px; box-shadow:0 1px 6px rgba(0,0,0,.2); }
.rc-wrap { max-width:min(88vw,440px); border-radius:14px; overflow:hidden; margin-bottom:6px; border:.5px solid var(--border-s); background:var(--rc-bg); backdrop-filter:blur(24px) saturate(140%); -webkit-backdrop-filter:blur(24px) saturate(140%); }
.rc-head { display:flex; align-items:center; justify-content:space-between; padding:8px 13px; cursor:pointer; user-select:none; gap:8px; }
.rc-label { font-size:11px; font-weight:500; letter-spacing:.1px; color:var(--fg3); }
.rc-status { display:flex; align-items:center; gap:5px; }
.rc-dot { width:5px; height:5px; border-radius:50%; background:var(--fg3); animation:pulse 1.8s ease-in-out infinite; }
.rc-dot.done { animation:none; background:rgba(52,199,89,.55); }
@keyframes pulse { 0%,100%{opacity:.25;} 50%{opacity:.85;} }
.rc-dur { font-size:10.5px; color:var(--fg3); }
.rc-chv { font-size:10px; color:var(--fg3); transition:transform .22s cubic-bezier(.4,0,.2,1); }
.rc-chv.open { transform:rotate(180deg); }
.rc-body { overflow:hidden; max-height:0; transition:max-height .36s cubic-bezier(.32,1.08,.5,1); }
.rc-body.open { max-height:520px; overflow-y:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.rc-body.open::-webkit-scrollbar { display:none; }
.rc-text { font-size:12px; line-height:1.6; color:var(--fg3); padding:0 13px 11px; white-space:pre-wrap; word-break:break-word; font-style:italic; }
.rc-tools { padding:0 10px 10px; display:flex; flex-direction:column; gap:5px; }
.rc-tools:empty { display:none; }
.rc-tools .srch-wrap { max-width:100%; margin-bottom:0; }
.rc-step { font-size:10.5px; color:var(--fg3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.7; margin-top:1px; font-style:italic; max-width:200px; }
.rc-tool-count { font-size:10px; color:var(--fg3); opacity:.7; margin-left:4px; }
.srch-wrap { max-width:min(88vw,440px); margin-bottom:6px; }
.srch-bar {
  display:flex; align-items:center; gap:8px; padding:8px 12px;
  background:rgba(0,113,227,.08); border:.5px solid rgba(0,113,227,.18);
  border-radius:12px;
}
.srch-bar.done {
  background:rgba(52,199,89,.06); border-color:rgba(52,199,89,.18);
}
.srch-ico { width:13px; height:13px; flex-shrink:0; animation:spin 1s linear infinite; }
.srch-ico path { fill:var(--blue-l); }
.srch-bar.done .srch-ico { animation:none; }
.srch-bar.done .srch-ico path { fill:rgba(52,199,89,.8); }
@keyframes spin { to{transform:rotate(360deg);} }
.srch-q { font-size:12px; color:var(--blue-l); font-weight:500; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.srch-bar.done .srch-q { color:rgba(52,199,89,.8); }
.srch-count { font-size:10.5px; color:var(--fg3); flex-shrink:0; }
.src-chips { display:flex; flex-wrap:wrap; gap:5px; margin-top:5px; }
.src-chip {
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 9px; background:var(--input-bg);
  border:.5px solid var(--border-s); border-radius:20px;
  text-decoration:none; font-size:11px; color:var(--fg2);
  transition:transform .22s cubic-bezier(.2,1,.3,1), background .13s, color .13s; max-width:150px; min-width:0;
}
.src-chip:hover { background:var(--surface-hi); color:var(--fg); }
.src-chip:active { transform:scale(.95); }
.src-chip img { width:12px; height:12px; border-radius:2px; flex-shrink:0; object-fit:cover; }
.src-chip span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.t-row { display:flex; gap:3px; margin-top:4px; padding:0 2px; opacity:0; transition:opacity .16s; }
.msg-group:hover .t-row,.msg-group:focus-within .t-row { opacity:1; }
.tact { border:none; border-radius:7px; padding:3px 9px; font-size:10.5px; color:var(--fg3); background:var(--input-bg); cursor:pointer; font-family:inherit; transition:transform .2s cubic-bezier(.2,1,.3,1), color .12s; }
.tact:active { color:var(--fg2); transform:scale(.92); }
.btime { font-size:10px; color:var(--fg3); margin-top:4px; padding:0 3px; }
.md { color:var(--ai-fg); }
.md h1 { font-size:17.5px; font-weight:700; letter-spacing:-.4px; margin:9px 0 5px; }
.md h2 { font-size:15.5px; font-weight:600; letter-spacing:-.3px; margin:8px 0 4px; }
.md h3 { font-size:14px; font-weight:600; margin:7px 0 3px; }
.md strong { font-weight:600; }
.md em { font-style:italic; opacity:.85; }
.md a { color:var(--blue-l); text-decoration:none; }
.md a:hover { text-decoration:underline; }
.md ul { padding:3px 0 3px 12px; margin:3px 0; list-style:none; }
.md ul li { position:relative; padding:1px 0 1px 12px; }
.md ul li::before { content:'·'; position:absolute; left:0; color:var(--fg3); font-size:14px; line-height:1.4; }
.md ol { padding:3px 0 3px 18px; margin:3px 0; }
.md ol li { padding:1px 0; }
.md p { margin:4px 0; }
.md hr { border:none; border-top:.5px solid var(--sep); margin:8px 0; }
.ic { display:inline; background:rgba(255,255,255,.09); border-radius:4px; padding:1px 5px; font-size:12.5px; font-family:'SF Mono',Menlo,Monaco,'Courier New',monospace; letter-spacing:.05px; }
@media (prefers-color-scheme:light) { .ic { background:rgba(0,0,0,.07); } }
.cb { border-radius:12px; overflow:hidden; margin:7px 0; box-shadow:0 3px 14px rgba(0,0,0,.32); }
.cb-hdr { display:flex; align-items:center; justify-content:space-between; padding:7px 12px; background:#181820; border-bottom:.5px solid rgba(255,255,255,.05); }
.cb-lang { font-size:10.5px; font-weight:500; color:rgba(255,255,255,.32); letter-spacing:.5px; text-transform:uppercase; font-family:'SF Mono',Menlo,monospace; }
.cb-copy { border:none; background:rgba(255,255,255,.08); border-radius:6px; padding:2px 9px; font-size:10.5px; color:rgba(255,255,255,.45); cursor:pointer; font-family:inherit; transition:all .12s; }
.cb-copy:active { background:rgba(255,255,255,.14); }
.cb pre { margin:0; }
.cb pre code { font-family:'SF Mono',Menlo,Monaco,'Courier New',monospace; font-size:12px; line-height:1.65; padding:10px 13px; display:block; overflow-x:auto; background:#14141a; }
.typing { display:flex; gap:4.5px; align-items:center; padding:11px 14px; border-radius:18px; border-bottom-left-radius:4px; background:var(--ai-bg); backdrop-filter:blur(32px) saturate(160%); -webkit-backdrop-filter:blur(32px) saturate(160%); border:.5px solid var(--border); max-width:58px; animation:bubbleIn .32s cubic-bezier(.34,1.3,.64,1); }
.td { width:6px; height:6px; border-radius:50%; background:var(--fg3); animation:td 1.1s cubic-bezier(.36,.11,.89,.32) infinite; }

  if (isUser) items.push({ label: 'Újraküldés', action: 'resend', icon: '<svg viewBox="0 0 24 24"><path d="M7 7h10v2H7zm0 4h7v2H7z"/><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>' });
  else items.push({ label: 'Újragenerálás', action: 'retry', icon: '<svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>' });
  items.push({ label: 'Törlés', action: 'delete', danger: true, icon: '<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>' });
  return items;
}
function showCtx(group, x, y) {
  const isUser = group.classList.contains('u');
  ctxPreview.innerHTML = '';
  ctxPreview.appendChild(buildPreview(group));
  ctxMenu.innerHTML = '';
  for (const item of buildCtxItems(group, isUser)) {
    const btn = document.createElement('button');
    btn.className = 'ctx-item' + (item.danger ? ' danger' : '');
    btn.innerHTML = `${item.icon}<span>${item.label}</span>`;
    btn.addEventListener('click', async () => {
      await handleCtxAction(item.action, group, isUser);
      closeCtx();
    });
    ctxMenu.appendChild(btn);
  }
  ctxOverlay.classList.add('vis');
  ctxPreview.classList.add('vis');
  ctxMenu.classList.add('vis');
  requestAnimationFrame(() => {
    const previewRect = ctxPreview.getBoundingClientRect();
    const menuRect = ctxMenu.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const previewX = isUser ? Math.max(12, vw - previewRect.width - 14) : 14;
    const previewY = Math.max(12, Math.min(y - previewRect.height - 8, Math.max(12, vh - previewRect.height - 12)));
    let menuX = Math.max(12, Math.min(x, vw - menuRect.width - 12));
    let menuY = Math.max(12, Math.min(previewY + previewRect.height + 8, Math.max(12, vh - menuRect.height - 12)));
    if (menuY + menuRect.height > vh - 12) menuY = Math.max(12, previewY - menuRect.height - 8);
    menuY = Math.max(12, Math.min(menuY, Math.max(12, vh - menuRect.height - 12)));
    ctxPreview.style.left = previewX + 'px';
    ctxPreview.style.top = previewY + 'px';
    ctxMenu.style.left = menuX + 'px';
    ctxMenu.style.top = menuY + 'px';
  });
}
async function handleCtxAction(action, group, isUser) {
  const text = getGroupCopyText(group);
  if (action === 'copy') {
    const fakeBtn = document.createElement('button');
    cptext(text, fakeBtn);
    return;
  }
  if (action === 'edit') {
    if (!isUser) return;
    const payload = getUserComposerPayload(group);
    await populateComposerFromPayload(payload || { rawText: text, fullText: text, imageUrls: [], imgPay: [], textAtts: [] });
    ta.focus();
    if (typeof grow === 'function') grow();
    return;
  }
  if (action === 'resend') {
    if (!isUser) return;
    const payload = getUserComposerPayload(group);
    await populateComposerFromPayload(payload || { rawText: text, fullText: text, imageUrls: [], imgPay: [], textAtts: [] });
    ta.focus();
    if (typeof grow === 'function') grow();
    await send();
    return;
  }
  if (action === 'retry') {
    if (typeof group._retryAction === 'function') group._retryAction();
    return;
  }
  if (action === 'delete') {
    if (sid) markDeletedGroup(sid, group);
    group.style.transition = 'opacity .22s, transform .26s cubic-bezier(.4,0,1,1)';
    group.style.opacity = '0';
    group.style.transform = 'scale(.92)';
    let doneTimer = 0;
    const done = () => {
      if (doneTimer) { clearTimeout(doneTimer); doneTimer = 0; }
      group.removeEventListener('transitionend', done);
      group.remove();
      syncMsgsFromDom();
      updHist();
      if (sbOpen) renderHist();
    };
    group.addEventListener('transitionend', done, { once: true });
    doneTimer = window.setTimeout(done, 340);
  }
}
msgList.addEventListener('touchstart', e => {
  const group = findMsgGroup(e.target);
  if (!group || e.touches.length !== 1) return;
  lpStartX = e.touches[0].clientX;
  lpStartY = e.touches[0].clientY;
  msgList.style.webkitUserSelect = 'none';
  msgList.style.userSelect = 'none';
  clearTimeout(longPressTimer);
  longPressTimer = window.setTimeout(() => {
    if (navigator.vibrate) navigator.vibrate([12]);
    showCtx(group, lpStartX, lpStartY);
  }, 500);
}, { passive: true });
msgList.addEventListener('touchmove', e => {
  if (!longPressTimer || e.touches.length !== 1) return;
  const dx = Math.abs(e.touches[0].clientX - lpStartX);
  const dy = Math.abs(e.touches[0].clientY - lpStartY);
  if (dx > 22 || dy > 22) {
    clearTimeout(longPressTimer);
    longPressTimer = 0;
    msgList.style.webkitUserSelect = '';
    msgList.style.userSelect = '';
  }
}, { passive: true });
function clearLongPress() {
  clearTimeout(longPressTimer);
  longPressTimer = 0;
  msgList.style.webkitUserSelect = '';
  msgList.style.userSelect = '';
}
msgList.addEventListener('touchend', clearLongPress, { passive: true });
msgList.addEventListener('touchcancel', clearLongPress, { passive: true });
msgList.addEventListener('contextmenu', e => {
  if (e.target instanceof Element && e.target.closest('a[href],img')) return;
  const group = findMsgGroup(e.target);
  if (!group) return;
  e.preventDefault();
  showCtx(group, e.clientX, e.clientY);
});
})();
</script>
